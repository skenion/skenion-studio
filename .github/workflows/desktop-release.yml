name: Desktop Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Studio release tag to package, for example v0.46.0
        required: true
        type: string
      runtime-tag:
        description: Exact Runtime release tag whose release artifact manifest stages the desktop Runtime binary, for example v0.46.0
        required: true
        type: string
      release-mode:
        description: Release mode; publish uploads desktop packages to DSUB S3 and compact indexes to the GitHub Release, verify builds only
        default: verify
        required: false
        type: string
      runtime-manifest-url:
        description: Optional Runtime release artifact manifest URL override; defaults to the manifest asset on the Runtime GitHub Release
        required: false
        type: string
      desktop-signing-mode:
        description: Desktop signing mode; unsigned-preview must be explicitly selected only for internal/pre-alpha gate evidence
        default: signed-required
        required: false
        type: string

permissions:
  contents: write

concurrency:
  group: studio-desktop-release-${{ inputs.tag }}
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  RELEASE_TAG: ${{ inputs.tag }}
  RELEASE_MODE: ${{ inputs['release-mode'] }}
  RUNTIME_MANIFEST_URL: ${{ inputs['runtime-manifest-url'] }}
  RUNTIME_TAG: ${{ inputs['runtime-tag'] }}
  DESKTOP_SIGNING_MODE: ${{ inputs['desktop-signing-mode'] }}

jobs:
  release:
    name: release metadata
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.validate.outputs.tag }}
      tag_ref: ${{ steps.validate.outputs.tag_ref }}
      version: ${{ steps.validate.outputs.version }}
      runtime_tag: ${{ steps.validate.outputs.runtime_tag }}
      desktop_signing_mode: ${{ steps.validate.outputs.desktop_signing_mode }}
      upload_release_assets: ${{ steps.validate.outputs.upload_release_assets }}
    steps:
      - id: validate
        name: Validate release request
        shell: bash
        env:
          RELEASE_TAG: ${{ env.RELEASE_TAG }}
          RELEASE_MODE: ${{ env.RELEASE_MODE }}
          RUNTIME_TAG: ${{ env.RUNTIME_TAG }}
          DESKTOP_SIGNING_MODE: ${{ env.DESKTOP_SIGNING_MODE }}
        run: |
          set -euo pipefail

          if [[ ! "${RELEASE_TAG}" =~ ^v(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)$ ]]; then
            echo "::error::release tag must be vx.y.z; got '${RELEASE_TAG}'."
            exit 1
          fi

          version="${RELEASE_TAG#v}"

          if [[ -z "${RUNTIME_TAG}" ]]; then
            echo "::error::runtime-tag is required so desktop packaging stages exact Runtime release manifest evidence."
            exit 1
          fi
          if [[ ! "${RUNTIME_TAG}" =~ ^v(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)$ ]]; then
            echo "::error::runtime-tag must be vx.y.z; got '${RUNTIME_TAG}'."
            exit 1
          fi

          case "${RELEASE_MODE}" in
            publish)
              upload_release_assets=true
              ;;
            verify)
              upload_release_assets=false
              ;;
            *)
              echo "::error::release-mode must be publish or verify; got '${RELEASE_MODE}'."
              exit 1
              ;;
          esac

          desktop_signing_mode="${DESKTOP_SIGNING_MODE}"
          if [[ -z "${desktop_signing_mode}" ]]; then
            echo "::error::desktop-signing-mode is required. Use signed-required for release-complete signing gates or explicitly pass unsigned-preview only for internal/pre-alpha gate evidence."
            exit 1
          fi
          case "${desktop_signing_mode}" in
            unsigned-preview|signed-required|azure-trusted-signing)
              ;;
            *)
              echo "::error::desktop-signing-mode must be unsigned-preview, signed-required, or azure-trusted-signing; got '${desktop_signing_mode}'."
              exit 1
              ;;
          esac

          {
            echo "tag=${RELEASE_TAG}"
            echo "tag_ref=refs/tags/${RELEASE_TAG}"
            echo "version=${version}"
            echo "runtime_tag=${RUNTIME_TAG}"
            echo "desktop_signing_mode=${desktop_signing_mode}"
            echo "upload_release_assets=${upload_release_assets}"
          } >> "${GITHUB_OUTPUT}"

      - uses: actions/checkout@v6
        with:
          ref: ${{ steps.validate.outputs.tag_ref }}

      - name: Validate skenion studio package versions
        shell: bash
        env:
          EXPECTED_VERSION: ${{ steps.validate.outputs.version }}
        run: |
          set -euo pipefail
          node <<'NODE'
          const fs = require("node:fs");
          const expected = process.env.EXPECTED_VERSION;
          const contractsRange = ">=0.45.0 <0.46.0";
          const packageJson = JSON.parse(fs.readFileSync("package.json", "utf8"));
          const tauriConfig = JSON.parse(fs.readFileSync("src-tauri/tauri.conf.json", "utf8"));
          const cargoToml = fs.readFileSync("src-tauri/Cargo.toml", "utf8");
          const cargoVersion = cargoToml.match(/^version = "([^"]+)"$/m)?.[1];
          const contractsDependency = packageJson.dependencies?.["@skenion/contracts"];
          const contractsPeerDependency = packageJson.peerDependencies?.["@skenion/contracts"];

          const versions = {
            "package.json": packageJson.version,
            "src-tauri/tauri.conf.json": tauriConfig.version,
            "src-tauri/Cargo.toml": cargoVersion
          };
          for (const [source, actual] of Object.entries(versions)) {
            if (actual !== expected) {
              console.error(`::error::${source} version ${actual} does not match release ${expected}.`);
              process.exit(1);
            }
          }
          expectContractsLine(contractsDependency, "package.json dependencies.@skenion/contracts");
          if (contractsPeerDependency !== undefined && contractsPeerDependency !== contractsRange) {
            console.error(`::error::package.json peerDependencies.@skenion/contracts ${contractsPeerDependency} does not match ${contractsRange}.`);
            process.exit(1);
          }

          function expectContractsLine(actual, label) {
            if (typeof actual !== "string" || !/^(0|[1-9]\d*)\.(0|[1-9]\d*)\.(0|[1-9]\d*)$/.test(actual)) {
              console.error(`::error::${label} must be a concrete 0.45.x package version, got ${actual ?? "<missing>"}.`);
              process.exit(1);
            }
            const [major, minor] = actual.split(".").map(Number);
            if (major !== 0 || minor !== 45) {
              console.error(`::error::${label} ${actual} must satisfy ${contractsRange}.`);
              process.exit(1);
            }
          }
          NODE

      - name: Summarize desktop release request
        shell: bash
        run: |
          {
            echo "## skenion studio Desktop Release"
            echo ""
            echo "- Studio tag: ${{ steps.validate.outputs.tag }}"
            echo "- Studio version: ${{ steps.validate.outputs.version }}"
            echo "- Runtime release manifest tag: ${{ steps.validate.outputs.runtime_tag }}"
            echo "- Contracts npm package: @skenion/contracts@0.45.0"
            echo "- Contracts compatibility: >=0.45.0 <0.46.0"
            echo "- Mode: ${RELEASE_MODE}"
            echo "- Desktop signing mode: ${{ steps.validate.outputs.desktop_signing_mode }}"
            echo "- Publish desktop artifact evidence: ${{ steps.validate.outputs.upload_release_assets }}"
          } >> "${GITHUB_STEP_SUMMARY}"

  desktop-package:
    name: desktop package (${{ matrix.target }})
    needs: release
    runs-on: ${{ matrix.runner }}
    continue-on-error: ${{ matrix.release_blocking == false }}
    timeout-minutes: 45
    defaults:
      run:
        shell: bash
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            runner: macos-14
            release_blocking: true
            tier: release-blocking
            tauri_bundle_args: ""
          - target: x86_64-apple-darwin
            runner: macos-15-intel
            release_blocking: true
            tier: release-blocking
            tauri_bundle_args: ""
          - target: x86_64-pc-windows-msvc
            runner: windows-2022
            release_blocking: true
            tier: release-blocking
            tauri_bundle_args: ""
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-24.04
            release_blocking: true
            tier: release-blocking
            tauri_bundle_args: "--bundles deb,rpm"
          - target: aarch64-pc-windows-msvc
            runner: windows-11-arm
            release_blocking: false
            tier: preview
            tauri_bundle_args: ""
          - target: aarch64-unknown-linux-gnu
            runner: ubuntu-24.04-arm
            release_blocking: false
            tier: preview
            tauri_bundle_args: "--bundles deb,rpm"
    env:
      TARGET: ${{ matrix.target }}
      VERSION: ${{ needs.release.outputs.version }}
      RUNTIME_TAG: ${{ needs.release.outputs.runtime_tag }}
      DESKTOP_SIGNING_MODE: ${{ needs.release.outputs.desktop_signing_mode }}
      TAURI_BUNDLE_ARGS: ${{ matrix.tauri_bundle_args }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.release.outputs.tag_ref }}

      - name: Preflight macOS signing and notarization secrets
        if: needs.release.outputs.upload_release_assets == 'true' && runner.os == 'macOS' && matrix.release_blocking == true && needs.release.outputs.desktop_signing_mode != 'unsigned-preview'
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          set -euo pipefail
          failed=false
          signing_missing=()
          notarization_missing=()
          for name in APPLE_CERTIFICATE APPLE_CERTIFICATE_PASSWORD APPLE_SIGNING_IDENTITY; do
            if [[ -z "${!name:-}" ]]; then
              signing_missing+=("${name}")
            fi
          done
          for name in APPLE_ID APPLE_PASSWORD APPLE_TEAM_ID; do
            if [[ -z "${!name:-}" ]]; then
              notarization_missing+=("${name}")
            fi
          done

          if ((${#signing_missing[@]} > 0)); then
            echo "::error::macOS publish mode requires signing secrets: ${signing_missing[*]}."
            failed=true
          fi
          if ((${#notarization_missing[@]} > 0)); then
            echo "::error::macOS publish mode requires Apple ID notarization secrets: ${notarization_missing[*]}."
            failed=true
          fi
          if [[ "${failed}" == "true" ]]; then
            exit 1
          fi
          echo "macOS signing and notarization secret preflight passed."

      - name: Summarize unsigned macOS preview mode
        if: needs.release.outputs.upload_release_assets == 'true' && runner.os == 'macOS' && matrix.release_blocking == true && needs.release.outputs.desktop_signing_mode == 'unsigned-preview'
        run: |
          {
            echo "## macOS Signing Gate"
            echo ""
            echo "- Target: ${TARGET}"
            echo "- Desktop signing mode: unsigned-preview"
            echo "- macOS release-completion status: blocked"
            echo "- Reason: unsigned internal/pre-alpha artifact evidence does not satisfy signed/notarized desktop release completion."
          } >> "${GITHUB_STEP_SUMMARY}"

      - name: Preflight Windows installer signing policy
        if: needs.release.outputs.upload_release_assets == 'true' && runner.os == 'Windows'
        env:
          DESKTOP_SIGNING_MODE: ${{ needs.release.outputs.desktop_signing_mode }}
        run: |
          set -euo pipefail

          mode="${DESKTOP_SIGNING_MODE}"
          if [[ -z "${mode}" ]]; then
            echo "::error::Windows publish mode requires desktop-signing-mode. Use unsigned-preview only for explicit non-release-complete evidence, or add a signed mode after Tauri signing is wired."
            exit 1
          fi

          case "${mode}" in
            unsigned-preview)
              signing_status="unsigned-preview"
              release_completion="blocked"
              ;;
            signed-required|azure-trusted-signing)
              echo "::error::desktop signing mode '${mode}' is reserved for signed Windows installer releases, but this workflow does not yet configure Tauri Windows signing. Wire signing first instead of publishing artifacts that only claim to be signed."
              exit 1
              ;;
            *)
              echo "::error::desktop signing mode must be unsigned-preview, signed-required, or azure-trusted-signing; got '${mode}'."
              exit 1
              ;;
          esac

          {
            echo "## Windows Installer Signing Gate"
            echo ""
            echo "- Target: ${TARGET}"
            echo "- App installer artifact class: Tauri Windows installer bundle"
            echo "- Primary Windows installer family: NSIS setup executable (-setup.exe)"
            echo "- Secondary Windows installer family: MSI, when emitted by Tauri"
            echo "- Windows installer signing mode: ${signing_status}"
            echo "- Windows release-completion status: ${release_completion}"
          } >> "${GITHUB_STEP_SUMMARY}"

      - uses: pnpm/action-setup@v6
        with:
          version: 10.12.4

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - uses: actions/setup-python@v6
        with:
          python-version: "3.x"

      - name: Install Linux desktop dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Add Rust target
        run: rustup target add "${TARGET}"

      - uses: Swatinem/rust-cache@v2
        with:
          prefix-key: skenion-studio-desktop-release-${{ matrix.target }}
          cache-all-crates: "true"
          cache-on-failure: "true"
          workspaces: src-tauri -> target

      - name: Verify released Contracts npm package
        env:
          CONTRACTS_VERSION: 0.45.0
        run: |
          set -euo pipefail
          if ! released_version="$(pnpm view "@skenion/contracts@${CONTRACTS_VERSION}" version --silent)"; then
            echo "::error::@skenion/contracts@${CONTRACTS_VERSION} is not available on npm."
            exit 1
          fi
          if [[ "${released_version}" != "${CONTRACTS_VERSION}" ]]; then
            echo "::error::@skenion/contracts@${CONTRACTS_VERSION} is not available on npm."
            exit 1
          fi

      - name: Install studio dependencies from released packages
        run: |
          set -euo pipefail
          pnpm install --no-frozen-lockfile
          node <<'NODE'
          const fs = require("node:fs");
          const contractsRange = ">=0.45.0 <0.46.0";
          const packageJson = JSON.parse(fs.readFileSync("package.json", "utf8"));
          const declared = packageJson.dependencies?.["@skenion/contracts"];
          const declaredPeer = packageJson.peerDependencies?.["@skenion/contracts"];
          const installed = JSON.parse(fs.readFileSync("node_modules/@skenion/contracts/package.json", "utf8"));

          if (!isContracts45(declared)) {
            console.error(`::error::package.json declares @skenion/contracts as ${declared}, expected a concrete version satisfying ${contractsRange}.`);
            process.exit(1);
          }
          if (declaredPeer !== undefined && declaredPeer !== contractsRange) {
            console.error(`::error::package.json peerDependency declares @skenion/contracts as ${declaredPeer}, expected ${contractsRange}.`);
            process.exit(1);
          }
          if (!isContracts45(installed.version)) {
            console.error(`::error::installed @skenion/contracts is ${installed.version}, expected ${contractsRange}.`);
            process.exit(1);
          }

          function isContracts45(version) {
            if (typeof version !== "string" || !/^(0|[1-9]\d*)\.(0|[1-9]\d*)\.(0|[1-9]\d*)$/.test(version)) {
              return false;
            }
            const [major, minor] = version.split(".").map(Number);
            return major === 0 && minor === 45;
          }
          NODE

      - name: Stage Runtime binary from release manifest
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          args=(
            --runtime-tag "${RUNTIME_TAG}"
            --target "${TARGET}"
            --mode "${RELEASE_MODE}"
          )
          if [[ -n "${RUNTIME_MANIFEST_URL}" ]]; then
            args+=(--runtime-manifest-url "${RUNTIME_MANIFEST_URL}")
          fi
          pnpm run stage-runtime-sidecar -- "${args[@]}"

      - name: Verify release Tauri packaging inputs
        run: |
          node <<'NODE'
          const fs = require("node:fs");
          const target = process.env.TARGET;
          const bundleArgs = process.env.TAURI_BUNDLE_ARGS ?? "";
          const baseConfig = JSON.parse(fs.readFileSync("src-tauri/tauri.conf.json", "utf8"));
          const releaseConfig = JSON.parse(fs.readFileSync("src-tauri/tauri.release.conf.json", "utf8"));
          const config = mergeConfig(baseConfig, releaseConfig);
          if (!target) {
            fail("TARGET is required for release Tauri packaging input validation.");
          }
          if (!config.bundle?.externalBin?.includes("binaries/skenion-runtime")) {
            fail("Release Tauri bundle.externalBin must include binaries/skenion-runtime.");
          }
          const icons = config.bundle?.icon ?? [];
          for (const icon of icons) {
            const iconPath = `src-tauri/${icon}`;
            if (!fs.existsSync(iconPath)) {
              fail(`Tauri bundle.icon entry '${icon}' must exist at ${iconPath}.`);
            }
          }
          if (target.includes("windows")) {
            const windowsIcon = "icons/icon.ico";
            const iconPath = `src-tauri/${windowsIcon}`;
            if (!icons.includes(windowsIcon)) {
              fail(`Windows desktop releases require Tauri bundle.icon to include ${windowsIcon}.`);
            }
            if (!fs.existsSync(iconPath)) {
              fail("Windows desktop releases require src-tauri/icons/icon.ico for the Tauri Windows resource file.");
            }
            validateIcoFile(iconPath);
          }
          const isLinux = target.endsWith("-unknown-linux-gnu");
          if (isLinux && bundleArgs !== "--bundles deb,rpm") {
            fail(`Linux desktop releases must currently scope Tauri bundles to deb,rpm; got '${bundleArgs}'.`);
          }
          if (!isLinux && bundleArgs !== "") {
            fail(`Non-Linux desktop releases should use native Tauri bundle defaults; got '${bundleArgs}'.`);
          }

          function validateIcoFile(iconPath) {
            const icon = fs.readFileSync(iconPath);
            const headerLength = 6;
            const directoryEntryLength = 16;
            if (icon.length < headerLength) {
              fail(`${iconPath} must include a complete ICO header.`);
            }

            const reserved = icon.readUInt16LE(0);
            const type = icon.readUInt16LE(2);
            const count = icon.readUInt16LE(4);
            if (reserved !== 0 || type !== 1) {
              fail(`${iconPath} must be an ICO image file with reserved=0 and type=1.`);
            }
            if (count === 0) {
              fail(`${iconPath} must contain at least one image entry.`);
            }

            const directoryLength = headerLength + count * directoryEntryLength;
            if (icon.length < directoryLength) {
              fail(`${iconPath} declares ${count} image entries but the ICO directory is truncated.`);
            }

            for (let index = 0; index < count; index += 1) {
              const entryOffset = headerLength + index * directoryEntryLength;
              const width = decodeIcoDimension(icon[entryOffset]);
              const height = decodeIcoDimension(icon[entryOffset + 1]);
              const entryReserved = icon[entryOffset + 3];
              const planes = icon.readUInt16LE(entryOffset + 4);
              const bitDepth = icon.readUInt16LE(entryOffset + 6);
              const imageLength = icon.readUInt32LE(entryOffset + 8);
              const imageOffset = icon.readUInt32LE(entryOffset + 12);
              const imageEnd = imageOffset + imageLength;
              const entryLabel = `${iconPath} entry ${index + 1}`;

              if (entryReserved !== 0) {
                fail(`${entryLabel} has a nonzero reserved byte.`);
              }
              if (width <= 0 || height <= 0) {
                fail(`${entryLabel} must declare nonzero dimensions.`);
              }
              if (imageLength === 0) {
                fail(`${entryLabel} must point to a non-empty image payload.`);
              }
              if (imageOffset < directoryLength) {
                fail(`${entryLabel} image offset ${imageOffset} overlaps the ${directoryLength}-byte ICO directory.`);
              }
              if (imageEnd > icon.length) {
                fail(`${entryLabel} image range ${imageOffset}-${imageEnd} exceeds file length ${icon.length}.`);
              }

              const pngPayload = isPngPayload(icon, imageOffset, imageLength);
              if ((planes === 0 || bitDepth === 0) && !pngPayload) {
                fail(`${entryLabel} must declare a nonzero color plane count and bit depth unless it embeds a PNG payload.`);
              }
            }
          }

          function isPngPayload(icon, imageOffset, imageLength) {
            const pngSignature = Buffer.from([0x89, 0x50, 0x4e, 0x47, 0x0d, 0x0a, 0x1a, 0x0a]);
            return imageLength >= pngSignature.length && icon.subarray(imageOffset, imageOffset + pngSignature.length).equals(pngSignature);
          }

          function decodeIcoDimension(value) {
            return value === 0 ? 256 : value;
          }

          function mergeConfig(base, overlay) {
            if (!isPlainObject(base) || !isPlainObject(overlay)) {
              return overlay;
            }

            const merged = { ...base };
            for (const [key, value] of Object.entries(overlay)) {
              if (value === null) {
                delete merged[key];
              } else if (isPlainObject(value) && isPlainObject(merged[key])) {
                merged[key] = mergeConfig(merged[key], value);
              } else {
                merged[key] = value;
              }
            }
            return merged;
          }

          function isPlainObject(value) {
            return Object.prototype.toString.call(value) === "[object Object]";
          }

          function fail(message) {
            console.error(`::error::${message}`);
            process.exit(1);
          }
          NODE

      - name: Build unsigned preview Tauri desktop package (macOS)
        if: runner.os == 'macOS' && needs.release.outputs.desktop_signing_mode == 'unsigned-preview'
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
          PNPM_HOME: ${{ env.PNPM_HOME }}
        with:
          includeUpdaterJson: false
          projectPath: .
          tauriScript: pnpm tauri
          args: --target ${{ matrix.target }} --config src-tauri/tauri.release.conf.json ${{ matrix.tauri_bundle_args }}

      - name: Build signed Tauri desktop package (macOS)
        if: runner.os == 'macOS' && needs.release.outputs.desktop_signing_mode != 'unsigned-preview'
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
          PNPM_HOME: ${{ env.PNPM_HOME }}
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        with:
          includeUpdaterJson: false
          projectPath: .
          tauriScript: pnpm tauri
          args: --target ${{ matrix.target }} --config src-tauri/tauri.release.conf.json ${{ matrix.tauri_bundle_args }}

      - name: Build Tauri desktop package (non-macOS)
        if: runner.os != 'macOS'
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
          PNPM_HOME: ${{ env.PNPM_HOME }}
        with:
          includeUpdaterJson: false
          projectPath: .
          tauriScript: pnpm tauri
          args: --target ${{ matrix.target }} --config src-tauri/tauri.release.conf.json ${{ matrix.tauri_bundle_args }}

      - id: package_studio_desktop
        name: Package canonical skenion studio desktop release asset
        if: needs.release.outputs.upload_release_assets == 'true'
        run: pnpm run package-studio-desktop -- --target "${TARGET}" --version "${VERSION}"

      - name: Install AWS CLI
        if: needs.release.outputs.upload_release_assets == 'true'
        run: |
          python -m pip install --upgrade pip
          python -m pip install awscli
          python - <<'PY'
          import os
          import sysconfig

          scripts = sysconfig.get_path("scripts")
          if not scripts:
              raise SystemExit("could not determine Python scripts directory for awscli")
          with open(os.environ["GITHUB_PATH"], "a", encoding="utf-8") as output:
              print(scripts, file=output)
          PY

      - name: Check AWS CLI
        if: needs.release.outputs.upload_release_assets == 'true'
        run: aws --version

      - id: publish_desktop
        name: Publish skenion studio desktop package to DSUB S3
        if: needs.release.outputs.upload_release_assets == 'true'
        env:
          SKENION_RELEASE_S3_ENDPOINT: ${{ secrets.SKENION_RELEASE_S3_ENDPOINT }}
          SKENION_RELEASE_S3_REGION: ${{ secrets.SKENION_RELEASE_S3_REGION }}
          SKENION_RELEASE_S3_BUCKET: ${{ secrets.SKENION_RELEASE_S3_BUCKET }}
          SKENION_RELEASE_S3_PREFIX: ${{ secrets.SKENION_RELEASE_S3_PREFIX }}
          SKENION_RELEASE_S3_ACCESS_KEY_ID: ${{ secrets.SKENION_RELEASE_S3_ACCESS_KEY_ID }}
          SKENION_RELEASE_S3_SECRET_ACCESS_KEY: ${{ secrets.SKENION_RELEASE_S3_SECRET_ACCESS_KEY }}
          SKENION_RELEASE_S3_FORCE_PATH_STYLE: ${{ secrets.SKENION_RELEASE_S3_FORCE_PATH_STYLE }}
          SKENION_RELEASE_PUBLIC_BASE_URL: ${{ secrets.SKENION_RELEASE_PUBLIC_BASE_URL }}
          CONTRACTS_VERSION: 0.45.0
          CONTRACTS_LINE: "0.45"
          CONTRACTS_RANGE: ">=0.45.0 <0.46.0"
        run: |
          set -euo pipefail
          SOURCE_COMMIT="$(git rev-parse HEAD)" scripts/publish-studio-desktop-asset-s3.sh \
            "${VERSION}" \
            "${{ needs.release.outputs.tag }}" \
            "${TARGET}" \
            "${{ matrix.tier }}" \
            "${{ steps.package_studio_desktop.outputs.asset_path }}" \
            "${{ steps.package_studio_desktop.outputs.checksum_path }}"

      - name: Upload DSUB desktop artifact index to GitHub Release
        if: needs.release.outputs.upload_release_assets == 'true'
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          INDEX_PATH: ${{ steps.publish_desktop.outputs.index_path }}
        run: |
          set -euo pipefail

          if [[ -z "${GH_TOKEN:-}" ]]; then
            echo "::error::GH_TOKEN organization Actions secret is required for GitHub Release mutation."
            exit 1
          fi

          index_name="$(basename "${INDEX_PATH}")"
          release_assets="$(mktemp)"
          download_dir="$(mktemp -d)"
          cleanup_release_asset_check() {
            rm -f "${release_assets}"
            rm -rf "${download_dir}"
          }
          trap cleanup_release_asset_check EXIT

          gh release view "${{ needs.release.outputs.tag }}" --json assets --jq '.assets[].name' >"${release_assets}"
          if grep -Fxq "${index_name}" "${release_assets}"; then
            gh release download "${{ needs.release.outputs.tag }}" --pattern "${index_name}" --dir "${download_dir}"
            if cmp -s "${INDEX_PATH}" "${download_dir}/${index_name}"; then
              echo "GitHub Release DSUB desktop artifact index already exists with identical content: ${index_name}"
              exit 0
            fi

            echo "::error::GitHub Release DSUB desktop artifact index already exists with different content: ${index_name}"
            exit 1
          fi

          gh release upload "${{ needs.release.outputs.tag }}" "${INDEX_PATH}"

      - name: Summarize desktop package
        run: |
          {
            echo "## skenion studio Desktop Package"
            echo ""
            echo "- Target: ${TARGET}"
            echo "- Tier: ${{ matrix.tier }}"
            echo "- Runtime release manifest tag: ${RUNTIME_TAG}"
            echo "- Tauri bundle args: ${TAURI_BUNDLE_ARGS:-native defaults}"
            echo "- Desktop signing mode: ${DESKTOP_SIGNING_MODE}"
            echo "- Publish desktop artifact evidence: ${{ needs.release.outputs.upload_release_assets }}"
            if [[ "${{ needs.release.outputs.upload_release_assets }}" == "true" ]]; then
              echo "- Desktop package DSUB URL: ${{ steps.publish_desktop.outputs.desktop_asset_url }}"
              echo "- Desktop package checksum DSUB URL: ${{ steps.publish_desktop.outputs.desktop_checksum_url }}"
              echo "- Desktop package index release asset: ${{ steps.publish_desktop.outputs.index_asset }}"
              echo "- Desktop package contents: ${{ steps.package_studio_desktop.outputs.artifact_count }} Tauri artifact(s)"
            fi
            if [[ "${RUNNER_OS}" == "Windows" ]]; then
              echo "- Windows app installer family: primary NSIS setup executable (-setup.exe), secondary MSI when emitted"
              echo "- Windows installer signing mode: ${DESKTOP_SIGNING_MODE}"
            fi
          } >> "${GITHUB_STEP_SUMMARY}"

  desktop-release-status:
    name: desktop release status
    needs:
      - release
      - desktop-package
    if: needs.release.outputs.upload_release_assets == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout release status tools
        uses: actions/checkout@v6
        with:
          ref: ${{ github.sha }}
          path: .release-tools

      - name: Mark release as desktop artifact evidence
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          RELEASE_TAG: ${{ needs.release.outputs.tag }}
          RUNTIME_TAG: ${{ needs.release.outputs.runtime_tag }}
          DESKTOP_SIGNING_MODE: ${{ needs.release.outputs.desktop_signing_mode }}
        run: |
          node .release-tools/scripts/update-studio-release-status.mjs \
            --mode desktop-artifacts-published \
            --tag "${RELEASE_TAG}" \
            --runtime-tag "${RUNTIME_TAG}" \
            --desktop-signing-mode "${DESKTOP_SIGNING_MODE}"
