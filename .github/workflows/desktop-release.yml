name: Desktop Release

on:
  release:
    types:
      - published
  workflow_dispatch:
    inputs:
      tag:
        description: Studio release tag to package, for example skenion-studio-v0.43.0
        required: true
        type: string
      train-version:
        description: Lockstep product train version, such as 0.43.0
        required: true
        type: string
      release-train-mode:
        description: Release train mode; publish uploads to the GitHub Release, verify builds only
        default: verify
        required: false
        type: string
      release-manifest:
        description: Optional path to a checked-in release train manifest with Runtime sidecar checksums
        required: false
        type: string

permissions:
  contents: write

concurrency:
  group: studio-desktop-release-${{ github.event.release.tag_name || inputs.tag }}
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  RELEASE_TAG: ${{ github.event.release.tag_name || inputs.tag }}
  RELEASE_TRAIN_MODE: ${{ github.event_name == 'release' && 'publish' || inputs['release-train-mode'] }}
  RELEASE_MANIFEST: ${{ inputs['release-manifest'] }}
  WINDOWS_INSTALLER_SIGNING_MODE: ${{ vars.WINDOWS_INSTALLER_SIGNING_MODE }}

jobs:
  release:
    name: release metadata
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.validate.outputs.tag }}
      tag_ref: ${{ steps.validate.outputs.tag_ref }}
      version: ${{ steps.validate.outputs.version }}
      upload_release_assets: ${{ steps.validate.outputs.upload_release_assets }}
    steps:
      - id: validate
        name: Validate release request
        shell: bash
        env:
          RELEASE_TAG: ${{ env.RELEASE_TAG }}
          RELEASE_TRAIN_MODE: ${{ env.RELEASE_TRAIN_MODE }}
          TRAIN_VERSION: ${{ inputs['train-version'] }}
        run: |
          set -euo pipefail

          if [[ ! "${RELEASE_TAG}" =~ ^skenion-studio-v(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)$ ]]; then
            echo "::error::release tag must be skenion-studio-vx.y.z; got '${RELEASE_TAG}'."
            exit 1
          fi

          version="${RELEASE_TAG#skenion-studio-v}"
          if [[ -n "${TRAIN_VERSION}" && "${TRAIN_VERSION}" != "${version}" ]]; then
            echo "::error::train-version (${TRAIN_VERSION}) must match release tag version (${version})."
            exit 1
          fi

          case "${RELEASE_TRAIN_MODE}" in
            publish)
              upload_release_assets=true
              ;;
            verify)
              upload_release_assets=false
              ;;
            *)
              echo "::error::release-train-mode must be publish or verify; got '${RELEASE_TRAIN_MODE}'."
              exit 1
              ;;
          esac

          {
            echo "tag=${RELEASE_TAG}"
            echo "tag_ref=refs/tags/${RELEASE_TAG}"
            echo "version=${version}"
            echo "upload_release_assets=${upload_release_assets}"
          } >> "${GITHUB_OUTPUT}"

      - uses: actions/checkout@v6
        with:
          ref: ${{ steps.validate.outputs.tag_ref }}

      - name: Validate skenion studio package versions
        shell: bash
        env:
          EXPECTED_VERSION: ${{ steps.validate.outputs.version }}
        run: |
          set -euo pipefail
          node <<'NODE'
          const fs = require("node:fs");
          const expected = process.env.EXPECTED_VERSION;
          const packageJson = JSON.parse(fs.readFileSync("package.json", "utf8"));
          const tauriConfig = JSON.parse(fs.readFileSync("src-tauri/tauri.conf.json", "utf8"));
          const cargoToml = fs.readFileSync("src-tauri/Cargo.toml", "utf8");
          const cargoVersion = cargoToml.match(/^version = "([^"]+)"$/m)?.[1];
          const contractsDependency = packageJson.dependencies?.["@skenion/contracts"];
          const contractsPeerDependency = packageJson.peerDependencies?.["@skenion/contracts"];

          const versions = {
            "package.json": packageJson.version,
            "src-tauri/tauri.conf.json": tauriConfig.version,
            "src-tauri/Cargo.toml": cargoVersion,
            "package.json dependencies.@skenion/contracts": contractsDependency
          };
          if (contractsPeerDependency !== undefined) {
            versions["package.json peerDependencies.@skenion/contracts"] = contractsPeerDependency;
          }
          for (const [source, actual] of Object.entries(versions)) {
            if (actual !== expected) {
              console.error(`::error::${source} version ${actual} does not match release ${expected}.`);
              process.exit(1);
            }
          }
          NODE

      - name: Summarize desktop release request
        shell: bash
        run: |
          {
            echo "## skenion studio Desktop Release"
            echo ""
            echo "- Studio tag: ${{ steps.validate.outputs.tag }}"
            echo "- Studio version: ${{ steps.validate.outputs.version }}"
            echo "- Runtime sidecar release: skenion-runtime-v${{ steps.validate.outputs.version }}"
            echo "- Contracts npm package: @skenion/contracts@${{ steps.validate.outputs.version }}"
            echo "- Mode: ${RELEASE_TRAIN_MODE}"
            echo "- Upload release assets: ${{ steps.validate.outputs.upload_release_assets }}"
          } >> "${GITHUB_STEP_SUMMARY}"

  desktop-package:
    name: desktop package (${{ matrix.target }})
    needs: release
    runs-on: ${{ matrix.runner }}
    continue-on-error: ${{ matrix.release_blocking == false }}
    timeout-minutes: 45
    defaults:
      run:
        shell: bash
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            runner: macos-14
            release_blocking: true
            tier: release-blocking
            tauri_bundle_args: ""
          - target: x86_64-apple-darwin
            runner: macos-15-intel
            release_blocking: true
            tier: release-blocking
            tauri_bundle_args: ""
          - target: x86_64-pc-windows-msvc
            runner: windows-2022
            release_blocking: true
            tier: release-blocking
            tauri_bundle_args: ""
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-24.04
            release_blocking: true
            tier: release-blocking
            tauri_bundle_args: "--bundles deb,rpm"
          - target: aarch64-pc-windows-msvc
            runner: windows-11-arm
            release_blocking: false
            tier: preview
            tauri_bundle_args: ""
          - target: aarch64-unknown-linux-gnu
            runner: ubuntu-24.04-arm
            release_blocking: false
            tier: preview
            tauri_bundle_args: "--bundles deb,rpm"
    env:
      TARGET: ${{ matrix.target }}
      VERSION: ${{ needs.release.outputs.version }}
      TAURI_BUNDLE_ARGS: ${{ matrix.tauri_bundle_args }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.release.outputs.tag_ref }}

      - name: Preflight macOS signing and notarization secrets
        if: needs.release.outputs.upload_release_assets == 'true' && runner.os == 'macOS' && matrix.release_blocking == true
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          set -euo pipefail
          failed=false
          signing_missing=()
          notarization_missing=()
          for name in APPLE_CERTIFICATE APPLE_CERTIFICATE_PASSWORD APPLE_SIGNING_IDENTITY; do
            if [[ -z "${!name:-}" ]]; then
              signing_missing+=("${name}")
            fi
          done
          for name in APPLE_ID APPLE_PASSWORD APPLE_TEAM_ID; do
            if [[ -z "${!name:-}" ]]; then
              notarization_missing+=("${name}")
            fi
          done

          if ((${#signing_missing[@]} > 0)); then
            echo "::error::macOS publish mode requires signing secrets: ${signing_missing[*]}."
            failed=true
          fi
          if ((${#notarization_missing[@]} > 0)); then
            echo "::error::macOS publish mode requires Apple ID notarization secrets: ${notarization_missing[*]}."
            failed=true
          fi
          if [[ "${failed}" == "true" ]]; then
            exit 1
          fi
          echo "macOS signing and notarization secret preflight passed."

      - name: Preflight Windows installer signing policy
        if: needs.release.outputs.upload_release_assets == 'true' && runner.os == 'Windows'
        env:
          WINDOWS_INSTALLER_SIGNING_MODE: ${{ env.WINDOWS_INSTALLER_SIGNING_MODE }}
        run: |
          set -euo pipefail

          mode="${WINDOWS_INSTALLER_SIGNING_MODE:-}"
          if [[ -z "${mode}" ]]; then
            echo "::error::Windows publish mode requires repository variable WINDOWS_INSTALLER_SIGNING_MODE. Use unsigned-preview only for explicit non-release-complete evidence, or add a signed mode after Tauri signing is wired."
            exit 1
          fi

          case "${mode}" in
            unsigned-preview)
              signing_status="unsigned-preview"
              release_completion="blocked"
              ;;
            signed-required|azure-trusted-signing)
              echo "::error::WINDOWS_INSTALLER_SIGNING_MODE=${mode} is reserved for signed Windows installer releases, but this workflow does not yet configure Tauri Windows signing. Wire signing first instead of publishing artifacts that only claim to be signed."
              exit 1
              ;;
            *)
              echo "::error::WINDOWS_INSTALLER_SIGNING_MODE must be unsigned-preview, signed-required, or azure-trusted-signing; got '${mode}'."
              exit 1
              ;;
          esac

          {
            echo "## Windows Installer Signing Gate"
            echo ""
            echo "- Target: ${TARGET}"
            echo "- App installer artifact class: Tauri Windows installer bundle"
            echo "- Primary Windows installer family: NSIS setup executable (-setup.exe)"
            echo "- Secondary Windows installer family: MSI, when emitted by Tauri"
            echo "- Runtime sidecar asset class: internal release-train transport ZIP"
            echo "- Windows installer signing mode: ${signing_status}"
            echo "- Windows release-completion status: ${release_completion}"
          } >> "${GITHUB_STEP_SUMMARY}"

      - uses: pnpm/action-setup@v6
        with:
          version: 10.12.4

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install Linux desktop dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Add Rust target
        run: rustup target add "${TARGET}"

      - uses: Swatinem/rust-cache@v2
        with:
          prefix-key: skenion-studio-desktop-release-${{ matrix.target }}
          cache-all-crates: "true"
          cache-on-failure: "true"
          workspaces: src-tauri -> target

      - name: Verify released Contracts npm package
        run: |
          set -euo pipefail
          if ! released_version="$(pnpm view "@skenion/contracts@${VERSION}" version --silent)"; then
            echo "::error::@skenion/contracts@${VERSION} is not available on npm."
            exit 1
          fi
          if [[ "${released_version}" != "${VERSION}" ]]; then
            echo "::error::@skenion/contracts@${VERSION} is not available on npm."
            exit 1
          fi

      - name: Install studio dependencies from released packages
        run: |
          set -euo pipefail
          pnpm install --no-frozen-lockfile
          node <<'NODE'
          const fs = require("node:fs");
          const expected = process.env.VERSION;
          const packageJson = JSON.parse(fs.readFileSync("package.json", "utf8"));
          const declared = packageJson.dependencies?.["@skenion/contracts"];
          const declaredPeer = packageJson.peerDependencies?.["@skenion/contracts"];
          const installed = JSON.parse(fs.readFileSync("node_modules/@skenion/contracts/package.json", "utf8"));

          if (declared !== expected) {
            console.error(`::error::package.json declares @skenion/contracts as ${declared}, expected ${expected}.`);
            process.exit(1);
          }
          if (declaredPeer !== undefined && declaredPeer !== expected) {
            console.error(`::error::package.json peerDependency declares @skenion/contracts as ${declaredPeer}, expected ${expected}.`);
            process.exit(1);
          }
          if (installed.version !== expected) {
            console.error(`::error::installed @skenion/contracts is ${installed.version}, expected ${expected}.`);
            process.exit(1);
          }
          NODE

      - name: Stage same-train Runtime sidecar
        env:
          SKENION_RELEASE_TRAIN_TOKEN: ${{ secrets.SKENION_RELEASE_TRAIN_TOKEN }}
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          args=(
            --version "${VERSION}"
            --target "${TARGET}"
            --mode "${RELEASE_TRAIN_MODE}"
          )
          if [[ -n "${RELEASE_MANIFEST}" ]]; then
            args+=(--manifest "${RELEASE_MANIFEST}")
          fi
          pnpm run stage-runtime-sidecar -- "${args[@]}"

      - id: package_runtime_sidecar
        name: Package skenion runtime sidecar release asset
        run: pnpm run package-runtime-sidecar -- --target "${TARGET}"

      - name: Verify Windows installer artifact classification
        if: runner.os == 'Windows'
        env:
          SIDECAR_ASSET_NAME: ${{ steps.package_runtime_sidecar.outputs.asset_name }}
        run: |
          set -euo pipefail

          if [[ ! "${SIDECAR_ASSET_NAME}" =~ ^skenion-runtime-sidecar-.+\.zip$ ]]; then
            echo "::error::Windows Runtime sidecar asset must be named as an internal sidecar ZIP; got '${SIDECAR_ASSET_NAME}'."
            exit 1
          fi
          if [[ "${SIDECAR_ASSET_NAME}" == *setup.exe || "${SIDECAR_ASSET_NAME}" == *.msi ]]; then
            echo "::error::Runtime sidecar '${SIDECAR_ASSET_NAME}' must not be classified as a Windows app installer."
            exit 1
          fi

          {
            echo "## Windows Artifact Classification"
            echo ""
            echo "- Target: ${TARGET}"
            echo "- User-facing Windows app installer: Tauri NSIS setup executable (-setup.exe)"
            echo "- Additional installer, if emitted: Tauri MSI"
            echo "- Runtime sidecar ZIP: ${SIDECAR_ASSET_NAME}"
            echo "- Sidecar ZIP installer status: not a skenion studio Windows installer"
          } >> "${GITHUB_STEP_SUMMARY}"

      - name: Upload skenion runtime sidecar release asset
        if: needs.release.outputs.upload_release_assets == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "${{ needs.release.outputs.tag }}" \
            "${{ steps.package_runtime_sidecar.outputs.asset_path }}" \
            "${{ steps.package_runtime_sidecar.outputs.checksum_path }}" \
            --clobber

      - name: Verify release Tauri packaging inputs
        run: |
          node <<'NODE'
          const fs = require("node:fs");
          const target = process.env.TARGET;
          const bundleArgs = process.env.TAURI_BUNDLE_ARGS ?? "";
          const baseConfig = JSON.parse(fs.readFileSync("src-tauri/tauri.conf.json", "utf8"));
          const releaseConfig = JSON.parse(fs.readFileSync("src-tauri/tauri.release.conf.json", "utf8"));
          const config = mergeConfig(baseConfig, releaseConfig);
          if (!config.bundle?.externalBin?.includes("binaries/skenion-runtime")) {
            console.error("::error::Release Tauri bundle.externalBin must include binaries/skenion-runtime.");
            process.exit(1);
          }
          const icons = config.bundle?.icon ?? [];
          for (const icon of icons) {
            const iconPath = `src-tauri/${icon}`;
            if (!fs.existsSync(iconPath)) {
              console.error(`::error::Tauri bundle.icon entry '${icon}' must exist at ${iconPath}.`);
              process.exit(1);
            }
          }
          if (target.includes("windows")) {
            const windowsIcon = "icons/icon.ico";
            const iconPath = `src-tauri/${windowsIcon}`;
            if (!icons.includes(windowsIcon)) {
              console.error(`::error::Windows desktop releases require Tauri bundle.icon to include ${windowsIcon}.`);
              process.exit(1);
            }
            if (!fs.existsSync(iconPath)) {
              console.error("::error::Windows desktop releases require src-tauri/icons/icon.ico for the Tauri Windows resource file.");
              process.exit(1);
            }
            validateIcoFile(iconPath);
          }
          const isLinux = target.endsWith("-unknown-linux-gnu");
          if (isLinux && bundleArgs !== "--bundles deb,rpm") {
            console.error(`::error::Linux desktop releases must currently scope Tauri bundles to deb,rpm; got '${bundleArgs}'.`);
            process.exit(1);
          }
          if (!isLinux && bundleArgs !== "") {
            console.error(`::error::Non-Linux desktop releases should use native Tauri bundle defaults; got '${bundleArgs}'.`);
            process.exit(1);
          }

          function validateIcoFile(iconPath) {
            const icon = fs.readFileSync(iconPath);
            const headerLength = 6;
            const directoryEntryLength = 16;
            if (icon.length < headerLength) {
              fail(`${iconPath} must include a complete ICO header.`);
            }

            const reserved = icon.readUInt16LE(0);
            const type = icon.readUInt16LE(2);
            const count = icon.readUInt16LE(4);
            if (reserved !== 0 || type !== 1) {
              fail(`${iconPath} must be an ICO image file with reserved=0 and type=1.`);
            }
            if (count === 0) {
              fail(`${iconPath} must contain at least one image entry.`);
            }

            const directoryLength = headerLength + count * directoryEntryLength;
            if (icon.length < directoryLength) {
              fail(`${iconPath} declares ${count} image entries but the ICO directory is truncated.`);
            }

            for (let index = 0; index < count; index += 1) {
              const entryOffset = headerLength + index * directoryEntryLength;
              const width = decodeIcoDimension(icon[entryOffset]);
              const height = decodeIcoDimension(icon[entryOffset + 1]);
              const entryReserved = icon[entryOffset + 3];
              const planes = icon.readUInt16LE(entryOffset + 4);
              const bitDepth = icon.readUInt16LE(entryOffset + 6);
              const imageLength = icon.readUInt32LE(entryOffset + 8);
              const imageOffset = icon.readUInt32LE(entryOffset + 12);
              const imageEnd = imageOffset + imageLength;
              const entryLabel = `${iconPath} entry ${index + 1}`;

              if (entryReserved !== 0) {
                fail(`${entryLabel} has a nonzero reserved byte.`);
              }
              if (width <= 0 || height <= 0) {
                fail(`${entryLabel} must declare nonzero dimensions.`);
              }
              if (planes === 0 || bitDepth === 0) {
                fail(`${entryLabel} must declare a nonzero color plane count and bit depth.`);
              }
              if (imageLength === 0) {
                fail(`${entryLabel} must point to a non-empty image payload.`);
              }
              if (imageOffset < directoryLength) {
                fail(`${entryLabel} image offset ${imageOffset} overlaps the ${directoryLength}-byte ICO directory.`);
              }
              if (imageEnd > icon.length) {
                fail(`${entryLabel} image range ${imageOffset}-${imageEnd} exceeds file length ${icon.length}.`);
              }
            }
          }

          function decodeIcoDimension(value) {
            return value === 0 ? 256 : value;
          }

          function mergeConfig(base, overlay) {
            if (!isPlainObject(base) || !isPlainObject(overlay)) {
              return overlay;
            }

            const merged = { ...base };
            for (const [key, value] of Object.entries(overlay)) {
              if (value === null) {
                delete merged[key];
              } else if (isPlainObject(value) && isPlainObject(merged[key])) {
                merged[key] = mergeConfig(merged[key], value);
              } else {
                merged[key] = value;
              }
            }
            return merged;
          }

          function isPlainObject(value) {
            return Object.prototype.toString.call(value) === "[object Object]";
          }

          function fail(message) {
            console.error(`::error::${message}`);
            process.exit(1);
          }
          NODE

      - name: Build Tauri desktop package (macOS)
        if: runner.os == 'macOS'
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ github.token }}
          PNPM_HOME: ${{ env.PNPM_HOME }}
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        with:
          includeUpdaterJson: false
          projectPath: .
          tauriScript: pnpm tauri
          args: --target ${{ matrix.target }} --config src-tauri/tauri.release.conf.json ${{ matrix.tauri_bundle_args }}

      - name: Build Tauri desktop package (non-macOS)
        if: runner.os != 'macOS'
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ github.token }}
          PNPM_HOME: ${{ env.PNPM_HOME }}
        with:
          includeUpdaterJson: false
          projectPath: .
          tauriScript: pnpm tauri
          args: --target ${{ matrix.target }} --config src-tauri/tauri.release.conf.json ${{ matrix.tauri_bundle_args }}

      - id: package_studio_desktop
        name: Package canonical skenion studio desktop release asset
        if: needs.release.outputs.upload_release_assets == 'true'
        run: pnpm run package-studio-desktop -- --target "${TARGET}" --version "${VERSION}"

      - name: Upload canonical skenion studio desktop release asset
        if: needs.release.outputs.upload_release_assets == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "${{ needs.release.outputs.tag }}" \
            "${{ steps.package_studio_desktop.outputs.asset_path }}" \
            "${{ steps.package_studio_desktop.outputs.checksum_path }}" \
            --clobber

      - name: Summarize desktop package
        run: |
          {
            echo "## skenion studio Desktop Package"
            echo ""
            echo "- Target: ${TARGET}"
            echo "- Tier: ${{ matrix.tier }}"
            echo "- Runtime sidecar release asset: ${{ steps.package_runtime_sidecar.outputs.asset_name }}"
            echo "- Runtime sidecar checksum: ${{ steps.package_runtime_sidecar.outputs.asset_name }}.sha256"
            echo "- Tauri bundle args: ${TAURI_BUNDLE_ARGS:-native defaults}"
            echo "- Upload release assets: ${{ needs.release.outputs.upload_release_assets }}"
            if [[ "${{ needs.release.outputs.upload_release_assets }}" == "true" ]]; then
              echo "- Desktop package release asset: ${{ steps.package_studio_desktop.outputs.asset_name }}"
              echo "- Desktop package checksum: ${{ steps.package_studio_desktop.outputs.asset_name }}.sha256"
              echo "- Desktop package contents: ${{ steps.package_studio_desktop.outputs.artifact_count }} Tauri artifact(s)"
            fi
            if [[ "${RUNNER_OS}" == "Windows" ]]; then
              echo "- Windows app installer family: primary NSIS setup executable (-setup.exe), secondary MSI when emitted"
              echo "- Windows installer signing mode: ${WINDOWS_INSTALLER_SIGNING_MODE:-verify-mode-not-required}"
            fi
          } >> "${GITHUB_STEP_SUMMARY}"
