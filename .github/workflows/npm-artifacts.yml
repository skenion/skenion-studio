name: NPM Artifacts

on:
  release:
    types:
      - published
  workflow_dispatch:
    inputs:
      tag:
        description: Studio release tag to publish, for example skenion-studio-v0.43.0
        required: true
        type: string
      train-version:
        description: Lockstep product train version, such as 0.43.0
        required: true
        type: string
      release-train-mode:
        description: Release train mode; publish uploads npm artifacts, verify packs only
        default: verify
        required: false
        type: string

permissions:
  contents: read
  id-token: write

concurrency:
  group: studio-npm-artifacts-${{ github.event.release.tag_name || inputs.tag }}
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  NPM_REGISTRY: https://registry.npmjs.org/
  RELEASE_TAG: ${{ github.event.release.tag_name || inputs.tag }}
  RELEASE_TRAIN_MODE: ${{ github.event_name == 'release' && 'publish' || inputs['release-train-mode'] }}

jobs:
  npm-artifacts:
    name: npm artifacts
    runs-on: ubuntu-latest
    timeout-minutes: 25
    outputs:
      version: ${{ steps.validate.outputs.version }}
    steps:
      - id: validate
        name: Validate release request
        shell: bash
        env:
          RELEASE_TAG: ${{ env.RELEASE_TAG }}
          RELEASE_TRAIN_MODE: ${{ env.RELEASE_TRAIN_MODE }}
          TRAIN_VERSION: ${{ inputs['train-version'] }}
        run: |
          set -euo pipefail

          if [[ ! "${RELEASE_TAG}" =~ ^skenion-studio-v(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)$ ]]; then
            echo "::error::release tag must be skenion-studio-vx.y.z; got '${RELEASE_TAG}'."
            exit 1
          fi

          version="${RELEASE_TAG#skenion-studio-v}"
          if [[ -n "${TRAIN_VERSION}" && "${TRAIN_VERSION}" != "${version}" ]]; then
            echo "::error::train-version (${TRAIN_VERSION}) must match release tag version (${version})."
            exit 1
          fi

          case "${RELEASE_TRAIN_MODE}" in
            publish)
              publish_npm=true
              ;;
            verify)
              publish_npm=false
              ;;
            *)
              echo "::error::release-train-mode must be publish or verify; got '${RELEASE_TRAIN_MODE}'."
              exit 1
              ;;
          esac

          {
            echo "tag_ref=refs/tags/${RELEASE_TAG}"
            echo "version=${version}"
            echo "publish_npm=${publish_npm}"
          } >> "${GITHUB_OUTPUT}"

      - uses: actions/checkout@v6
        with:
          ref: ${{ steps.validate.outputs.tag_ref }}

      - name: Validate release tag npm artifact source
        shell: bash
        env:
          RELEASE_TAG: ${{ env.RELEASE_TAG }}
          VERSION: ${{ steps.validate.outputs.version }}
        run: |
          set -euo pipefail

          node <<'NODE'
          const fs = require("node:fs");
          const path = require("node:path");

          const releaseTag = process.env.RELEASE_TAG;
          const version = process.env.VERSION;
          const studioRepoUrl = "https://github.com/echovisionlab/skenion-studio";
          const failures = [];
          const missingFiles = new Set();
          const requiredFiles = [
            ".github/workflows/npm-artifacts.yml",
            "package.json",
            "pnpm-lock.yaml",
            "scripts/prepare-studio-npm-artifacts.mjs",
            "packages/studio-web/package.json",
            "packages/studio-web/README.md",
            "packages/studio-desktop/package.json",
            "packages/studio-desktop/README.md"
          ];
          const packages = [
            {
              name: "@skenion/studio-web",
              directory: "packages/studio-web",
              requiredFiles: ["dist", "studio-web-manifest.json", "README.md"]
            },
            {
              name: "@skenion/studio-desktop",
              directory: "packages/studio-desktop",
              requiredFiles: ["studio-desktop-manifest.json", "README.md"]
            }
          ];

          for (const filePath of requiredFiles) {
            if (!fs.existsSync(path.join(process.cwd(), filePath))) {
              missingFiles.add(filePath);
              fail(`missing required file: ${filePath}`);
            }
          }

          const rootPackage = readJson("package.json");
          if (rootPackage) {
            expectEqual(rootPackage.version, version, "package.json version");
            expectEqual(
              rootPackage.dependencies?.["@skenion/contracts"],
              version,
              "package.json dependencies.@skenion/contracts"
            );
            requireScript(rootPackage, "build");
            requireScript(rootPackage, "prepare-studio-npm-artifacts");
          }

          for (const packageDefinition of packages) {
            const packageJsonPath = `${packageDefinition.directory}/package.json`;
            const packageJson = readJson(packageJsonPath);
            if (!packageJson) {
              continue;
            }

            expectEqual(packageJson.name, packageDefinition.name, `${packageJsonPath} name`);
            expectEqual(packageJson.version, version, `${packageJsonPath} version`);
            expectEqual(
              packageJson.peerDependencies?.["@skenion/contracts"],
              version,
              `${packageJsonPath} peerDependencies.@skenion/contracts`
            );
            expectEqual(
              packageJson.publishConfig?.access,
              "public",
              `${packageJsonPath} publishConfig.access`
            );
            expectEqual(
              packageJson.repository?.url,
              studioRepoUrl,
              `${packageJsonPath} repository.url`
            );

            if (packageJson.private === true) {
              fail(`${packageJsonPath} must be publishable, but private is true`);
            }

            for (const packageFile of packageDefinition.requiredFiles) {
              if (!packageJson.files?.includes(packageFile)) {
                fail(`${packageJsonPath} files must include ${packageFile}`);
              }
            }
          }

          if (failures.length > 0) {
            for (const failure of failures) {
              console.error(`::error::${failure}`);
            }
            console.error(
              `::error::Checked-out release tag ${releaseTag} cannot publish Studio npm artifacts. ` +
                "Retarget or recreate the release tag to a commit containing the npm artifact " +
                "workflow, package definitions, and prepare script before dispatching NPM Artifacts " +
                "in publish mode. Do not publish from main or a local checkout."
            );
            process.exit(1);
          }

          console.log(`Validated Studio npm artifact source in ${releaseTag}.`);

          function readJson(relativePath) {
            try {
              if (!fs.existsSync(path.join(process.cwd(), relativePath))) {
                if (!missingFiles.has(relativePath)) {
                  fail(`missing required file: ${relativePath}`);
                }
                return undefined;
              }
              return JSON.parse(fs.readFileSync(path.join(process.cwd(), relativePath), "utf8"));
            } catch (error) {
              fail(`cannot parse ${relativePath}: ${error.message}`);
              return undefined;
            }
          }

          function requireScript(packageJson, scriptName) {
            if (typeof packageJson.scripts?.[scriptName] !== "string") {
              fail(`package.json scripts.${scriptName} is required`);
            }
          }

          function expectEqual(actual, expected, label) {
            if (actual !== expected) {
              fail(`${label} is ${actual ?? "<missing>"}, expected ${expected}`);
            }
          }

          function fail(message) {
            failures.push(message);
          }
          NODE

      - uses: pnpm/action-setup@v6
        with:
          version: 10.12.4

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - name: Verify released Contracts npm package
        env:
          VERSION: ${{ steps.validate.outputs.version }}
        run: |
          set -euo pipefail
          if ! released_version="$(pnpm view "@skenion/contracts@${VERSION}" version --silent --registry "${NPM_REGISTRY}")"; then
            echo "::error::@skenion/contracts@${VERSION} is not available on npm."
            exit 1
          fi
          if [[ "${released_version}" != "${VERSION}" ]]; then
            echo "::error::@skenion/contracts@${VERSION} is not available on npm."
            exit 1
          fi

      - name: Install Studio dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Studio web artifact
        run: pnpm run build

      - name: Prepare npm artifact packages
        env:
          RELEASE_TAG: ${{ env.RELEASE_TAG }}
          VERSION: ${{ steps.validate.outputs.version }}
        run: pnpm run prepare-studio-npm-artifacts -- --version "${VERSION}" --tag "${RELEASE_TAG}"

      - name: Pack npm artifacts
        shell: bash
        run: |
          set -euo pipefail
          npm pack --dry-run ./packages/studio-web
          npm pack --dry-run ./packages/studio-desktop

      - name: Publish npm artifacts
        if: steps.validate.outputs.publish_npm == 'true'
        shell: bash
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          VERSION: ${{ steps.validate.outputs.version }}
        run: |
          set -euo pipefail

          if [[ -z "${NODE_AUTH_TOKEN:-}" ]]; then
            echo "::error::NPM_TOKEN is required to publish Studio npm artifacts."
            exit 1
          fi

          publish_package() {
            local package_dir="$1"
            local package_name="$2"

            if npm view "${package_name}@${VERSION}" version --silent --registry "${NPM_REGISTRY}" >/dev/null 2>&1; then
              echo "${package_name}@${VERSION} already exists on npm; skipping publish and enforcing public access."
            else
              npm publish "${package_dir}" --provenance --access public --registry "${NPM_REGISTRY}"
            fi

            enforce_public_access "${package_name}"
            verify_authenticated_view "${package_name}"
          }

          enforce_public_access() {
            local package_name="$1"
            local attempts=6

            for attempt in $(seq 1 "${attempts}"); do
              local access_output
              local access_status

              set +e
              access_output="$(npm access public "${package_name}" --registry "${NPM_REGISTRY}" 2>&1)"
              access_status=$?
              set -e

              if [[ "${access_status}" -eq 0 ]]; then
                echo "npm access public accepted for ${package_name}."
                return
              fi

              if grep -Eiq "(already|currently).*(public)|already has public access|is already public" <<< "${access_output}"; then
                echo "npm reports ${package_name} is already public."
                printf '%s\n' "${access_output}" | sed 's/^/npm access: /'
                return
              fi

              if [[ "${attempt}" -lt "${attempts}" ]]; then
                echo "::notice::npm access public ${package_name} failed on attempt ${attempt}/${attempts}; retrying in 10 seconds."
                printf '%s\n' "${access_output}" | sed 's/^/npm access: /'
                sleep 10
                continue
              fi

              echo "::error::Unable to enforce public npm access for ${package_name} after ${attempts} attempts."
              printf '%s\n' "${access_output}" | sed 's/^/npm access: /'
              exit 1
            done
          }

          verify_authenticated_view() {
            local package_name="$1"
            local published_version

            if published_version="$(npm view "${package_name}@${VERSION}" version --silent --registry "${NPM_REGISTRY}")" && [[ "${published_version}" == "${VERSION}" ]]; then
              echo "Authenticated npm view sees ${package_name}@${VERSION}."
              return
            fi

            echo "::warning::Authenticated npm view did not immediately return ${package_name}@${VERSION} after publish/access enforcement."
          }

          print_target_access_diagnostic() {
            local access_json_file
            local access_error_file

            access_json_file="$(mktemp)"
            access_error_file="$(mktemp)"

            if npm access ls-packages @skenion --json --registry "${NPM_REGISTRY}" >"${access_json_file}" 2>"${access_error_file}"; then
              ACCESS_JSON_FILE="${access_json_file}" node <<'NODE'
          const fs = require("node:fs");

          let packageAccess = {};
          try {
            packageAccess = JSON.parse(fs.readFileSync(process.env.ACCESS_JSON_FILE, "utf8"));
          } catch (error) {
            console.log(`::warning::Unable to parse npm access ls-packages diagnostic JSON: ${error.message}`);
          }
          for (const packageName of ["@skenion/studio-web", "@skenion/studio-desktop"]) {
            const access = Object.hasOwn(packageAccess, packageName)
              ? JSON.stringify(packageAccess[packageName])
              : "<not listed>";
            console.log(`npm access ls-packages target entry: ${packageName}=${access}`);
          }
          NODE
            else
              echo "::warning::npm access ls-packages @skenion failed; package-level public access enforcement already ran."
              sed 's/^/npm access ls-packages: /' "${access_error_file}"
            fi

            rm -f "${access_json_file}" "${access_error_file}"
          }

          publish_package ./packages/studio-web @skenion/studio-web
          publish_package ./packages/studio-desktop @skenion/studio-desktop
          print_target_access_diagnostic

      - name: Verify published npm artifacts
        if: steps.validate.outputs.publish_npm == 'true'
        shell: bash
        env:
          VERSION: ${{ steps.validate.outputs.version }}
        run: |
          set -euo pipefail
          public_npm_userconfig="$(mktemp)"
          public_npm_error="$(mktemp)"
          trap 'rm -f "${public_npm_userconfig}" "${public_npm_error}"' EXIT

          for package_name in @skenion/studio-web @skenion/studio-desktop; do
            echo "Waiting for unauthenticated public npm view of ${package_name}@${VERSION} from ${NPM_REGISTRY}."
            for attempt in {1..30}; do
              : >"${public_npm_error}"
              npm_view_output=""
              if npm_view_output="$(NODE_AUTH_TOKEN= NPM_CONFIG_USERCONFIG="${public_npm_userconfig}" npm view "${package_name}@${VERSION}" version --silent --registry "${NPM_REGISTRY}" 2>"${public_npm_error}")" && [[ "${npm_view_output}" == "${VERSION}" ]]; then
                echo "Verified public npm visibility for ${package_name}@${VERSION}."
                break
              fi
              if [[ "${attempt}" == "30" ]]; then
                echo "::error::${package_name}@${VERSION} was not visible through unauthenticated npm view after publish and access enforcement."
                echo "::error::Checked ${NPM_REGISTRY} for 30 attempts over about 5 minutes. Do not publish locally; inspect npm package access or registry propagation before rerunning NPM Artifacts."
                printf '%s\n' "${npm_view_output}" | sed 's/^/npm view: /'
                sed 's/^/npm view: /' "${public_npm_error}"
                exit 1
              fi
              if (( attempt == 1 || attempt % 5 == 0 )); then
                echo "Public npm view is not visible yet for ${package_name}@${VERSION} (attempt ${attempt}/30)."
                printf '%s\n' "${npm_view_output}" | sed 's/^/npm view: /'
                sed 's/^/npm view: /' "${public_npm_error}"
              fi
              sleep 10
            done
          done

      - name: Summarize npm artifacts
        shell: bash
        run: |
          {
            echo "## Studio npm Artifacts"
            echo ""
            echo "- Version: ${{ steps.validate.outputs.version }}"
            echo "- Web package: @skenion/studio-web@${{ steps.validate.outputs.version }}"
            echo "- Desktop package: @skenion/studio-desktop@${{ steps.validate.outputs.version }}"
            echo "- Mode: ${RELEASE_TRAIN_MODE}"
            echo "- Publish npm: ${{ steps.validate.outputs.publish_npm }}"
          } >> "${GITHUB_STEP_SUMMARY}"
