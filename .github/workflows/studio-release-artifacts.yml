name: Studio Release Artifacts

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Studio release tag to package, for example v0.46.0
        required: true
        type: string
      runtime-tag:
        description: Exact Runtime release tag to record for release metadata, for example v0.46.0
        required: true
        type: string
      release-mode:
        description: Release mode; publish uploads DSUB web artifacts, verify packs only
        default: verify
        required: false
        type: string

permissions:
  artifact-metadata: write
  attestations: write
  contents: write
  id-token: write

concurrency:
  group: studio-release-artifacts-${{ inputs.tag }}
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  NPM_REGISTRY: https://registry.npmjs.org/
  RELEASE_TAG: ${{ inputs.tag }}
  RELEASE_MODE: ${{ inputs['release-mode'] }}
  RUNTIME_TAG: ${{ inputs['runtime-tag'] }}

jobs:
  release-artifacts:
    name: release artifacts
    runs-on: ubuntu-latest
    timeout-minutes: 25
    outputs:
      version: ${{ steps.validate.outputs.version }}
      web_asset: ${{ steps.release_assets.outputs.web_asset }}
      web_checksum_asset: ${{ steps.release_assets.outputs.web_checksum_asset }}
      desktop_manifest_asset: ${{ steps.release_assets.outputs.desktop_manifest_asset }}
      desktop_manifest_checksum_asset: ${{ steps.release_assets.outputs.desktop_manifest_checksum_asset }}
      checksum_asset: ${{ steps.release_assets.outputs.checksum_asset }}
      web_asset_url: ${{ steps.dsub_metadata.outputs.web_asset_url }}
      desktop_manifest_url: ${{ steps.dsub_metadata.outputs.desktop_manifest_url }}
      dsub_index_url: ${{ steps.dsub_metadata.outputs.index_url }}
    steps:
      - id: validate
        name: Validate release request
        shell: bash
        env:
          RELEASE_TAG: ${{ env.RELEASE_TAG }}
          RELEASE_MODE: ${{ env.RELEASE_MODE }}
          RUNTIME_TAG: ${{ env.RUNTIME_TAG }}
        run: |
          set -euo pipefail

          if [[ ! "${RELEASE_TAG}" =~ ^v(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)$ ]]; then
            echo "::error::release tag must be vx.y.z; got '${RELEASE_TAG}'."
            exit 1
          fi

          version="${RELEASE_TAG#v}"

          if [[ -z "${RUNTIME_TAG}" ]]; then
            echo "::error::runtime-tag is required so Studio release artifacts record the exact Runtime release metadata target."
            exit 1
          fi
          if [[ ! "${RUNTIME_TAG}" =~ ^v(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)$ ]]; then
            echo "::error::runtime-tag must be vx.y.z; got '${RUNTIME_TAG}'."
            exit 1
          fi

          case "${RELEASE_MODE}" in
            publish)
              upload_release_assets=true
              ;;
            verify)
              upload_release_assets=false
              ;;
            *)
              echo "::error::release-mode must be publish or verify; got '${RELEASE_MODE}'."
              exit 1
              ;;
          esac

          {
            echo "tag_ref=refs/tags/${RELEASE_TAG}"
            echo "version=${version}"
            echo "runtime_tag=${RUNTIME_TAG}"
            echo "upload_release_assets=${upload_release_assets}"
          } >> "${GITHUB_OUTPUT}"

      - name: Require GitHub release mutation token
        if: steps.validate.outputs.upload_release_assets == 'true'
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          if [[ -z "${GH_TOKEN:-}" ]]; then
            echo "::error::GH_TOKEN organization Actions secret is required for GitHub Release mutation."
            exit 1
          fi

      - uses: actions/checkout@v6
        with:
          ref: ${{ steps.validate.outputs.tag_ref }}

      - name: Validate release tag artifact source
        shell: bash
        env:
          RELEASE_TAG: ${{ env.RELEASE_TAG }}
          VERSION: ${{ steps.validate.outputs.version }}
        run: |
          set -euo pipefail

          node <<'NODE'
          const fs = require("node:fs");
          const path = require("node:path");

          const releaseTag = process.env.RELEASE_TAG;
          const version = process.env.VERSION;
          const studioRepoUrl = "https://github.com/skenion/skenion-studio";
          const contractsRange = ">=0.45.0 <0.46.0";
          const failures = [];
          const missingFiles = new Set();
          const requiredFiles = [
            ".github/workflows/studio-release-artifacts.yml",
            "package.json",
            "pnpm-lock.yaml",
            "scripts/publish-studio-asset-s3.sh",
            "scripts/package-studio-desktop.mjs",
            "scripts/prepare-studio-release-artifacts.mjs",
            "packages/studio-web/package.json",
            "packages/studio-web/README.md",
            "packages/studio-desktop/package.json",
            "packages/studio-desktop/README.md"
          ];
          const artifactPackages = [
            {
              name: "@skenion/studio-web",
              directory: "packages/studio-web",
              requiredFiles: ["dist", "studio-web-manifest.json", "README.md"]
            },
            {
              name: "@skenion/studio-desktop",
              directory: "packages/studio-desktop",
              requiredFiles: ["studio-desktop-manifest.json", "README.md"]
            }
          ];

          for (const filePath of requiredFiles) {
            if (!fs.existsSync(path.join(process.cwd(), filePath))) {
              missingFiles.add(filePath);
              fail(`missing required file: ${filePath}`);
            }
          }

          const rootPackage = readJson("package.json");
          if (rootPackage) {
            expectEqual(rootPackage.version, version, "package.json version");
            expectContractsLine(
              rootPackage.dependencies?.["@skenion/contracts"],
              "package.json dependencies.@skenion/contracts"
            );
            requireScript(rootPackage, "build");
            requireScript(rootPackage, "package-studio-desktop");
            requireScript(rootPackage, "prepare-studio-release-artifacts");
          }

          for (const artifactPackage of artifactPackages) {
            const packageJsonPath = `${artifactPackage.directory}/package.json`;
            const packageJson = readJson(packageJsonPath);
            if (!packageJson) {
              continue;
            }

            expectEqual(packageJson.name, artifactPackage.name, `${packageJsonPath} name`);
            expectEqual(packageJson.version, version, `${packageJsonPath} version`);
            expectEqual(
              packageJson.peerDependencies?.["@skenion/contracts"],
              contractsRange,
              `${packageJsonPath} peerDependencies.@skenion/contracts`
            );
            expectEqual(
              packageJson.repository?.url,
              studioRepoUrl,
              `${packageJsonPath} repository.url`
            );

            if (packageJson.private !== true) {
              fail(`${packageJsonPath} must be private because Studio artifacts are not npm packages`);
            }
            if (packageJson.publishConfig !== undefined) {
              fail(`${packageJsonPath} must not define publishConfig`);
            }

            for (const packageFile of artifactPackage.requiredFiles) {
              if (!packageJson.files?.includes(packageFile)) {
                fail(`${packageJsonPath} files must include ${packageFile}`);
              }
            }
          }

          if (failures.length > 0) {
            for (const failure of failures) {
              console.error(`::error::${failure}`);
            }
            console.error(
              `::error::Checked-out release tag ${releaseTag} cannot package skenion studio release artifacts. ` +
                "Retarget or recreate the release tag to a commit containing the release artifact " +
                "workflow, private package metadata, and prepare script before dispatching Studio Release Artifacts."
            );
            process.exit(1);
          }

          console.log(`Validated skenion studio release artifact source in ${releaseTag}.`);

          function readJson(relativePath) {
            try {
              if (!fs.existsSync(path.join(process.cwd(), relativePath))) {
                if (!missingFiles.has(relativePath)) {
                  fail(`missing required file: ${relativePath}`);
                }
                return undefined;
              }
              return JSON.parse(fs.readFileSync(path.join(process.cwd(), relativePath), "utf8"));
            } catch (error) {
              fail(`cannot parse ${relativePath}: ${error.message}`);
              return undefined;
            }
          }

          function requireScript(packageJson, scriptName) {
            if (typeof packageJson.scripts?.[scriptName] !== "string") {
              fail(`package.json scripts.${scriptName} is required`);
            }
          }

          function expectEqual(actual, expected, label) {
            if (actual !== expected) {
              fail(`${label} is ${actual ?? "<missing>"}, expected ${expected}`);
            }
          }

          function expectContractsLine(actual, label) {
            if (typeof actual !== "string" || !/^(0|[1-9]\d*)\.(0|[1-9]\d*)\.(0|[1-9]\d*)$/.test(actual)) {
              fail(`${label} must be a concrete 0.45.x package version, got ${actual ?? "<missing>"}`);
              return;
            }
            const [major, minor] = actual.split(".").map(Number);
            if (major !== 0 || minor !== 45) {
              fail(`${label} ${actual} must satisfy ${contractsRange}`);
            }
          }

          function fail(message) {
            failures.push(message);
          }
          NODE

      - uses: pnpm/action-setup@v6
        with:
          version: 10.12.4

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - uses: actions/setup-python@v6
        with:
          python-version: "3.x"

      - name: Verify released Contracts npm package
        env:
          CONTRACTS_VERSION: 0.45.0
        run: |
          set -euo pipefail
          if ! released_version="$(pnpm view "@skenion/contracts@${CONTRACTS_VERSION}" version --silent --registry "${NPM_REGISTRY}")"; then
            echo "::error::@skenion/contracts@${CONTRACTS_VERSION} is not available on npm."
            exit 1
          fi
          if [[ "${released_version}" != "${CONTRACTS_VERSION}" ]]; then
            echo "::error::@skenion/contracts@${CONTRACTS_VERSION} is not available on npm."
            exit 1
          fi

      - name: Install studio dependencies
        run: pnpm install --frozen-lockfile

      - name: Build studio web bundle
        run: pnpm run build

      - name: Prepare release artifact metadata
        env:
          RELEASE_TAG: ${{ env.RELEASE_TAG }}
          VERSION: ${{ steps.validate.outputs.version }}
          RUNTIME_TAG: ${{ steps.validate.outputs.runtime_tag }}
          SKENION_RELEASE_S3_BUCKET: ${{ secrets.SKENION_RELEASE_S3_BUCKET }}
          SKENION_RELEASE_S3_PREFIX: ${{ secrets.SKENION_RELEASE_S3_PREFIX }}
          SKENION_RELEASE_PUBLIC_BASE_URL: ${{ secrets.SKENION_RELEASE_PUBLIC_BASE_URL }}
        run: pnpm run prepare-studio-release-artifacts -- --version "${VERSION}" --tag "${RELEASE_TAG}" --runtime-tag "${RUNTIME_TAG}"

      - name: Pack private artifact metadata
        shell: bash
        run: |
          set -euo pipefail
          npm pack --dry-run ./packages/studio-web
          npm pack --dry-run ./packages/studio-desktop

      - id: release_assets
        name: Create release assets
        shell: bash
        env:
          VERSION: ${{ steps.validate.outputs.version }}
        run: |
          set -euo pipefail

          asset_dir="$(mktemp -d)"
          web_asset="skenion-studio-web-bundle-v${VERSION}.tar.gz"
          web_checksum_asset="${web_asset}.sha256"
          desktop_manifest_asset="skenion-studio-desktop-manifest-v${VERSION}.json"
          desktop_manifest_checksum_asset="${desktop_manifest_asset}.sha256"
          checksum_asset="skenion-studio-release-artifacts-v${VERSION}.sha256"

          tar -czf "${asset_dir}/${web_asset}" \
            -C packages/studio-web \
            dist \
            studio-web-manifest.json \
            README.md
          cp packages/studio-desktop/studio-desktop-manifest.json "${asset_dir}/${desktop_manifest_asset}"

          (
            cd "${asset_dir}"
            sha256sum "${web_asset}" > "${web_checksum_asset}"
            sha256sum "${desktop_manifest_asset}" > "${desktop_manifest_checksum_asset}"
            sha256sum "${web_asset}" "${desktop_manifest_asset}" > "${checksum_asset}"
          )

          {
            echo "asset_dir=${asset_dir}"
            echo "web_asset=${web_asset}"
            echo "web_asset_path=${asset_dir}/${web_asset}"
            echo "web_checksum_asset=${web_checksum_asset}"
            echo "web_checksum_path=${asset_dir}/${web_checksum_asset}"
            echo "desktop_manifest_asset=${desktop_manifest_asset}"
            echo "desktop_manifest_path=${asset_dir}/${desktop_manifest_asset}"
            echo "desktop_manifest_checksum_asset=${desktop_manifest_checksum_asset}"
            echo "desktop_manifest_checksum_path=${asset_dir}/${desktop_manifest_checksum_asset}"
            echo "checksum_asset=${checksum_asset}"
            echo "checksum_path=${asset_dir}/${checksum_asset}"
          } >> "${GITHUB_OUTPUT}"

      - id: dsub_metadata
        name: Generate DSUB web artifact metadata
        shell: bash
        env:
          VERSION: ${{ steps.validate.outputs.version }}
          RUNTIME_TAG: ${{ steps.validate.outputs.runtime_tag }}
          SKENION_RELEASE_S3_ENDPOINT: ${{ secrets.SKENION_RELEASE_S3_ENDPOINT }}
          SKENION_RELEASE_S3_REGION: ${{ secrets.SKENION_RELEASE_S3_REGION }}
          SKENION_RELEASE_S3_BUCKET: ${{ secrets.SKENION_RELEASE_S3_BUCKET }}
          SKENION_RELEASE_S3_PREFIX: ${{ secrets.SKENION_RELEASE_S3_PREFIX }}
          SKENION_RELEASE_S3_FORCE_PATH_STYLE: ${{ secrets.SKENION_RELEASE_S3_FORCE_PATH_STYLE }}
          SKENION_RELEASE_PUBLIC_BASE_URL: ${{ secrets.SKENION_RELEASE_PUBLIC_BASE_URL }}
          CONTRACTS_VERSION: 0.45.0
          CONTRACTS_LINE: "0.45"
          CONTRACTS_RANGE: ">=0.45.0 <0.46.0"
        run: |
          set -euo pipefail
          SOURCE_COMMIT="$(git rev-parse HEAD)" scripts/publish-studio-asset-s3.sh \
            --dry-run \
            "${VERSION}" \
            "${RELEASE_TAG}" \
            "${{ steps.release_assets.outputs.web_asset_path }}" \
            "${{ steps.release_assets.outputs.web_checksum_path }}" \
            "${{ steps.release_assets.outputs.desktop_manifest_path }}" \
            "${{ steps.release_assets.outputs.desktop_manifest_checksum_path }}" \
            "${{ steps.release_assets.outputs.checksum_path }}"

      - id: attest
        name: Generate Studio web artifact provenance
        if: steps.validate.outputs.upload_release_assets == 'true'
        uses: actions/attest@v4
        with:
          github-token: ${{ secrets.GH_TOKEN }}
          subject-path: |
            ${{ steps.release_assets.outputs.web_asset_path }}
            ${{ steps.release_assets.outputs.web_checksum_path }}
            ${{ steps.release_assets.outputs.desktop_manifest_path }}
            ${{ steps.release_assets.outputs.desktop_manifest_checksum_path }}
            ${{ steps.release_assets.outputs.checksum_path }}
            ${{ steps.dsub_metadata.outputs.index_path }}

      - name: Install AWS CLI
        if: steps.validate.outputs.upload_release_assets == 'true'
        run: |
          python -m pip install --upgrade pip
          python -m pip install awscli
          python - <<'PY'
          import os
          import sysconfig

          scripts = sysconfig.get_path("scripts")
          if not scripts:
              raise SystemExit("could not determine Python scripts directory for awscli")
          with open(os.environ["GITHUB_PATH"], "a", encoding="utf-8") as output:
              print(scripts, file=output)
          PY

      - name: Check AWS CLI
        if: steps.validate.outputs.upload_release_assets == 'true'
        run: aws --version

      - id: publish
        name: Publish Studio web artifacts to DSUB S3
        if: steps.validate.outputs.upload_release_assets == 'true'
        shell: bash
        env:
          VERSION: ${{ steps.validate.outputs.version }}
          RUNTIME_TAG: ${{ steps.validate.outputs.runtime_tag }}
          SKENION_RELEASE_S3_ENDPOINT: ${{ secrets.SKENION_RELEASE_S3_ENDPOINT }}
          SKENION_RELEASE_S3_REGION: ${{ secrets.SKENION_RELEASE_S3_REGION }}
          SKENION_RELEASE_S3_BUCKET: ${{ secrets.SKENION_RELEASE_S3_BUCKET }}
          SKENION_RELEASE_S3_PREFIX: ${{ secrets.SKENION_RELEASE_S3_PREFIX }}
          SKENION_RELEASE_S3_ACCESS_KEY_ID: ${{ secrets.SKENION_RELEASE_S3_ACCESS_KEY_ID }}
          SKENION_RELEASE_S3_SECRET_ACCESS_KEY: ${{ secrets.SKENION_RELEASE_S3_SECRET_ACCESS_KEY }}
          SKENION_RELEASE_S3_FORCE_PATH_STYLE: ${{ secrets.SKENION_RELEASE_S3_FORCE_PATH_STYLE }}
          SKENION_RELEASE_PUBLIC_BASE_URL: ${{ secrets.SKENION_RELEASE_PUBLIC_BASE_URL }}
          CONTRACTS_VERSION: 0.45.0
          CONTRACTS_LINE: "0.45"
          CONTRACTS_RANGE: ">=0.45.0 <0.46.0"
        run: |
          set -euo pipefail
          SOURCE_COMMIT="$(git rev-parse HEAD)" scripts/publish-studio-asset-s3.sh \
            --use-existing-manifest \
            "${VERSION}" \
            "${RELEASE_TAG}" \
            "${{ steps.release_assets.outputs.web_asset_path }}" \
            "${{ steps.release_assets.outputs.web_checksum_path }}" \
            "${{ steps.release_assets.outputs.desktop_manifest_path }}" \
            "${{ steps.release_assets.outputs.desktop_manifest_checksum_path }}" \
            "${{ steps.release_assets.outputs.checksum_path }}"

      - name: Checkout release status tools
        if: steps.validate.outputs.upload_release_assets == 'true'
        uses: actions/checkout@v6
        with:
          ref: ${{ github.sha }}
          path: .release-tools

      - name: Mark release as web artifact evidence
        if: steps.validate.outputs.upload_release_assets == 'true'
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          SKENION_RELEASE_PUBLIC_BASE_URL: ${{ secrets.SKENION_RELEASE_PUBLIC_BASE_URL }}
        run: |
          node .release-tools/scripts/update-studio-release-status.mjs \
            --mode web-artifacts-published \
            --tag "${RELEASE_TAG}" \
            --runtime-tag "${RUNTIME_TAG}"

      - name: Summarize release artifacts
        shell: bash
        run: |
          {
            echo "## skenion studio Release Artifacts"
            echo ""
            echo "- Version: ${{ steps.validate.outputs.version }}"
            echo "- Runtime release tag recorded: ${{ steps.validate.outputs.runtime_tag }}"
            echo "- Web bundle artifact: ${{ steps.release_assets.outputs.web_asset }}"
            echo "- Web bundle DSUB URL: ${{ steps.dsub_metadata.outputs.web_asset_url }}"
            echo "- Web bundle checksum: ${{ steps.release_assets.outputs.web_checksum_asset }}"
            echo "- Desktop release metadata: ${{ steps.release_assets.outputs.desktop_manifest_asset }}"
            echo "- Desktop release metadata DSUB URL: ${{ steps.dsub_metadata.outputs.desktop_manifest_url }}"
            echo "- Desktop release metadata checksum: ${{ steps.release_assets.outputs.desktop_manifest_checksum_asset }}"
            echo "- Combined artifact checksum manifest: ${{ steps.release_assets.outputs.checksum_asset }}"
            echo "- DSUB web artifact index: ${{ steps.dsub_metadata.outputs.index_url }}"
            echo "- DSUB web artifact index URL: ${{ steps.dsub_metadata.outputs.index_url }}"
            echo "- Provenance: ${{ steps.attest.outputs.attestation-url }}"
            echo "- Mode: ${RELEASE_MODE}"
            echo "- Publish DSUB artifacts: ${{ steps.validate.outputs.upload_release_assets }}"
            echo "- npm publish: disabled"
          } >> "${GITHUB_STEP_SUMMARY}"
