name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: studio-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  release-workflow:
    name: Release Workflow
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - name: Check release script syntax
        run: bash -n scripts/*.sh
      - name: Validate Studio release workflow policy
        run: node scripts/validate-release-workflow-policy.mjs
      - name: Validate mocked Runtime sidecar staging
        run: node scripts/validate-stage-runtime-sidecar.mjs
      - name: Validate mocked Studio DSUB S3 publisher
        run: scripts/validate-studio-asset-s3-publisher.sh
      - name: Validate mocked Studio desktop DSUB S3 publisher
        run: scripts/validate-studio-desktop-asset-s3-publisher.sh

  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
        with:
          version: 10.12.4
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm run lint
      - run: pnpm run coverage

  build:
    name: Build
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
        with:
          version: 10.12.4
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm run build
