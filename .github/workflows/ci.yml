name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: studio-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  release-workflow:
    name: Release Workflow
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - name: Check release script syntax
        run: bash -n scripts/*.sh
      - name: Validate mocked Studio DSUB S3 publisher
        run: scripts/validate-studio-asset-s3-publisher.sh

  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6
      - uses: actions/checkout@v6
        with:
          repository: skenion/skenion-contracts
          path: .deps/skenion-contracts
      - uses: actions/checkout@v6
        with:
          repository: skenion/skenion-examples
          path: .deps/skenion-examples
      - name: Align cross-repo dependency branches
        if: github.event_name == 'pull_request'
        run: |
          for dep in .deps/skenion-contracts .deps/skenion-examples; do
            (
              cd "${dep}"
              if git ls-remote --exit-code origin "refs/heads/${GITHUB_HEAD_REF}" >/dev/null 2>&1; then
                git fetch --depth=1 origin "${GITHUB_HEAD_REF}"
                git checkout FETCH_HEAD
              fi
            )
          done
      - uses: pnpm/action-setup@v6
        with:
          version: 10.12.4
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
        working-directory: .deps/skenion-contracts
      - run: pnpm run build
        working-directory: .deps/skenion-contracts
      - run: pnpm install --frozen-lockfile
      - run: pnpm run lint
      - run: pnpm run coverage

  build:
    name: Build
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6
      - uses: actions/checkout@v6
        with:
          repository: skenion/skenion-contracts
          path: .deps/skenion-contracts
      - uses: actions/checkout@v6
        with:
          repository: skenion/skenion-examples
          path: .deps/skenion-examples
      - name: Align cross-repo dependency branches
        if: github.event_name == 'pull_request'
        run: |
          for dep in .deps/skenion-contracts .deps/skenion-examples; do
            (
              cd "${dep}"
              if git ls-remote --exit-code origin "refs/heads/${GITHUB_HEAD_REF}" >/dev/null 2>&1; then
                git fetch --depth=1 origin "${GITHUB_HEAD_REF}"
                git checkout FETCH_HEAD
              fi
            )
          done
      - uses: pnpm/action-setup@v6
        with:
          version: 10.12.4
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
        working-directory: .deps/skenion-contracts
      - run: pnpm run build
        working-directory: .deps/skenion-contracts
      - run: pnpm install --frozen-lockfile
      - run: pnpm run build
